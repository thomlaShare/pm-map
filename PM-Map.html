<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>PM Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-o9N1j7kGStpU46h1JLkB0zY1tIGbM4N1ZC5x0i0pGhY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-o8Ee1k3bQwA1ITP0Z8cRk2KyyE+3C1r6C5x0i0pGhY="
    crossorigin="">
  </script>

  <script>
    // Initialiser kortet
    const map = L.map('map').setView([56.162939, 10.203921], 6); // Danmark (Aarhus)

    // OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap-bidragsydere',
      maxZoom: 19
    }).addTo(map);
  </script>

</body>
</html>
