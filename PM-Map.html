<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>PM Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  /* ========= 1) INIT MAP ========= */
  const map = L.map('map').setView([56.162939, 10.203921], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  /* ========= 2) SHAREPOINT URL (FORCE JSON) ========= */
  const sharePointUrl =
    "https://tdc.sharepoint.com/sites/MobileFieldService" +
    "/_api/web/lists(guid'01D89745-9941-40F1-B943-402D01F2384F')" +
    "/items?$select=SiteName,Latitude,Longitude,InspectionStatus" +
    "&$top=5000" +
    "&$format=json";

  /* ========= 3) FETCH ========= */
  fetch(sharePointUrl, {
    credentials: "include"
  })
  .then(res => {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  })
  .then(data => {
    console.log("Items hentet:", data.d.results.length);
    addMarkers(data.d.results);
  })
  .catch(err => console.error("SharePoint‑fejl:", err));

  /* ========= 4) MARKERS ========= */
  function addMarkers(items) {
    items.forEach(item => {

      const lat = parseFloat(item.Latitude);
      const lon = parseFloat(item.Longitude);

      if (isNaN(lat) || isNaN(lon)) return;

      const name = item.SiteName || "Ukendt site";
      const status = item.InspectionStatus || "Ingen status";

      L.marker([lat, lon])
        .addTo(map)
        .bindPopup(
          `<strong>${name}</strong><br>Status: ${status}`
        );
    });
  }
</script>

</body>
</html>
